<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Student Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="page-shell">
    <section class="glass-panel form-panel">
        <div class="toolbar">
            <div>
                <p class="eyebrow">Student Details</p>
                <h1 th:text="${pageTitle}">Add Student</h1>
            </div>
            <div class="toolbar-actions">
                <a class="ghost-action" th:href="@{/}">Home</a>
                <a class="ghost-action" th:href="@{/students}">View Students</a>
            </div>
        </div>

        <form class="student-form" th:action="@{${formAction}}" th:object="${student}" method="post">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}" placeholder="Student name">
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="student@example.com">
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="field">
                <label for="department">Department</label>
                <input id="department" type="text" th:field="*{department}" placeholder="Computer Science">
                <p class="field-error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
            </div>

            <div class="field two-column">
                <div>
                    <label for="year">Year</label>
                    <input id="year" type="number" min="1" max="4" th:field="*{year}">
                    <p class="field-error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></p>
                </div>
                <div>
                    <label for="phone">Phone</label>
                    <input id="phone" type="text" th:field="*{phone}" placeholder="9876543210">
                    <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>
            </div>

            <div class="form-actions">
                <a class="ghost-action" th:href="@{/}">Cancel</a>
                <button class="primary-action" type="submit">Save Student</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
